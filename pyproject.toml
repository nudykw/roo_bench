[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = []

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
[tool.ruff.lint.isort]
known-first-party = ["api", "benchmark", "data", "export", "prompts", "system", "tests", "ui"]
