[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["api", "benchmark", "data", "export", "prompts", "system", "tests", "ui"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E501", "E402", "E741"]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
